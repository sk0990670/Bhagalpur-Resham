## ══════════════════════════════════════════════════════════════
## Bhagalpur Resham – Production Docker Compose
## Services: nginx · frontend · backend · mongodb · redis
## ══════════════════════════════════════════════════════════════

name: bhagalpur-resham

services:

  # ── Nginx – Reverse Proxy / Load Balancer ─────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: br-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - certbot_certs:/etc/nginx/ssl:ro           # Let's Encrypt certs
      - certbot_www:/var/www/certbot:ro            # ACME challenge
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Frontend – React + Vite SPA ───────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-}
        VITE_APP_ENV: production
      cache_from:
        - type=registry,ref=bhagalpurresham/frontend:buildcache
    container_name: br-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Backend – Node.js Express API ─────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
      cache_from:
        - type=registry,ref=bhagalpurresham/backend:buildcache
    container_name: br-backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB_NAME:-bhagalpur_resham}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    env_file:
      - ./server/.env
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

  # ── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: br-mongodb
    restart: unless-stopped
    command:
      - mongod
      - --auth
      - --journal
      - --wiredTigerCacheSizeGB
      - "0.5"           # Limit RAM for dev machines; increase for prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-bhagalpur_resham}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - app-network
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval",
             "db.adminCommand('ping').ok",
             "--username", "${MONGO_ROOT_USER:-admin}",
             "--password", "${MONGO_ROOT_PASSWORD:-changeme}",
             "--authenticationDatabase", "admin"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Redis – Session / Cache / Rate Limiting ──────────────
  redis:
    image: redis:7.4-alpine
    container_name: br-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-changeme}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru               # Evict LRU keys when full
      - --save
      - ""                        # Disable RDB persistence in prod (use AOF)
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --loglevel
      - warning
    volumes:
      - redis_data:/data
    networks:
      - app-network
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Certbot – Let's Encrypt SSL (manual renewal) ─────────
  certbot:
    image: certbot/certbot:latest
    container_name: br-certbot
    profiles: ["ssl"]           # Only started when: docker compose --profile ssl up
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

# ── Networks ─────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Volumes ──────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
