# ══════════════════════════════════════════════════════════════
# Nginx – Main Configuration
# ══════════════════════════════════════════════════════════════
user  nginx;
worker_processes  auto;          # One worker per CPU core

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# Max open files per worker = worker_connections × 2
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main buffer=16k flush=5s;

    # ── Performance ──────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    reset_timedout_connection on;
    types_hash_max_size 2048;
    server_tokens       off;        # Hide nginx version

    # ── Buffers ──────────────────────────────────────────────
    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    client_max_body_size        20m;   # Max upload: 20MB (images)
    large_client_header_buffers 4 8k;

    # ── Timeouts ─────────────────────────────────────────────
    client_body_timeout    30s;
    client_header_timeout  30s;
    send_timeout           30s;

    # ── Gzip Compression ─────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── SSL ──────────────────────────────────────────────────
    ssl_protocols               TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers   on;
    ssl_ciphers                 ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache           shared:SSL:10m;
    ssl_session_timeout         1d;
    ssl_session_tickets         off;
    ssl_stapling                on;
    ssl_stapling_verify         on;
    resolver                    8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout            5s;

    # ── Rate Limiting Zones ───────────────────────────────────
    # General API rate limit: 60 requests/min per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Auth endpoints: 10 requests/min per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Upload endpoints: 20 requests/min per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=20r/m;

    limit_req_status 429;

    # ── Connection Limiting ───────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 100;
    limit_conn_status 503;

    # ── Upstream – Backend API ────────────────────────────────
    upstream backend_api {
        server backend:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Upstream – Frontend ───────────────────────────────────
    upstream frontend_app {
        server frontend:80;
        keepalive 16;
    }

    # Include server blocks
    include /etc/nginx/conf.d/*.conf;
}
