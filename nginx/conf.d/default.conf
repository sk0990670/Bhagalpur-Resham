# ══════════════════════════════════════════════════════════════
# Nginx – Reverse Proxy Server Block
# Routes: / → frontend, /api → backend, /api-docs → backend
# ══════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bhagalpurresham.com www.bhagalpurresham.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bhagalpurresham.com www.bhagalpurresham.com;

    # SSL certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # HSTS (enable after SSL is verified working)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── API Proxy ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 8k;
        proxy_busy_buffers_size 16k;
    }

    # ── Auth endpoints (stricter rate limit) ──────────────────
    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Upload endpoints (body size + rate limit) ─────────────
    location ~ ^/api/(products|cms|banners).*/images {
        limit_req zone=upload_limit burst=5;
        client_max_body_size 20m;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Swagger API Docs ──────────────────────────────────────
    location /api-docs {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (React SPA) ──────────────────────────────────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ── Error pages ───────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Block common attack vectors
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }
}

# ── HTTP fallback for local/dev (no SSL) ─────────────────────
# Comment out when SSL is active
server {
    listen 80 default_server;
    server_name localhost _;

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api-docs {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
